services:
  - type: web
    name: chess-game-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:///./chess_game.db
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: chess-game-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://chess-game-backend-0sci.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
